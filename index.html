<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>课程管理平台</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@500;700;800;900&family=Albert+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@200;300;400;500;700;900&display=swap" rel="stylesheet" />
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#000}
body{font-family:'Albert Sans','Noto Sans SC',sans-serif;color:#fff;overflow-x:hidden;-webkit-font-smoothing:antialiased}
.bg{position:fixed;inset:0;z-index:0;overflow:hidden}
.bg img{width:100%;height:100%;object-fit:cover;opacity:.22}
.bg .g{position:absolute;width:clamp(400px,50vw,800px);height:clamp(400px,50vw,800px);border-radius:50%;background:radial-gradient(circle,rgba(82,168,255,.05)0%,transparent 70%);top:-15%;right:-10%;pointer-events:none;z-index:1}
.ol{position:fixed;inset:0;z-index:1;background:linear-gradient(180deg,rgba(0,0,0,.9)0%,rgba(0,0,0,.78)50%,rgba(0,0,0,.95)100%)}
.c{position:relative;z-index:2;max-width:1120px;margin:0 auto;padding:clamp(28px,3.5vh,56px) clamp(20px,3vw,48px);min-height:100vh}
/* Header */
header{padding-bottom:clamp(20px,2.5vh,40px);border-bottom:1px solid rgba(255,255,255,.04);margin-bottom:clamp(24px,3vh,48px)}
header .eyebrow{display:flex;align-items:center;gap:6px;font-size:clamp(9px,.55vw,11px);color:rgba(255,255,255,.25);letter-spacing:.12em;text-transform:uppercase;margin-bottom:clamp(8px,.8vh,14px)}
header .eyebrow .b{width:4px;height:4px;border-radius:50%;background:rgba(82,168,255,.5)}
header h1{font-family:'Big Shoulders Display','Noto Sans SC',sans-serif;font-weight:900;font-size:clamp(32px,3.8vw,64px);letter-spacing:-.018em;line-height:.9;background:linear-gradient(135deg,#fff 40%,rgba(82,168,255,.7));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header .sub{font-size:clamp(12px,.78vw,14px);color:rgba(255,255,255,.3);margin-top:clamp(6px,.6vh,12px);max-width:500px;line-height:1.5}
/* Course grid */
.gd{display:grid;grid-template-columns:1fr 1fr;gap:clamp(12px,1.2vw,20px)}
.course{position:relative;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.02);padding:clamp(18px,2vh,30px);transition:all .3s cubic-bezier(.16,1,.3,1);cursor:pointer;overflow:hidden;text-decoration:none;color:#fff;display:block}
.course::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(82,168,255,.04),transparent 50%);opacity:0;transition:opacity .4s;pointer-events:none}
.course:hover{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.12);transform:translateY(-3px)}
.course:hover::before{opacity:1}
.course .cs{position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#52a8ff,#8b5cf6);opacity:.6}
.course .icon{font-size:clamp(24px,2.4vw,40px);margin-bottom:clamp(8px,.8vh,14px);display:block;line-height:1}
.course h2{font-family:'Big Shoulders Display','Noto Sans SC',sans-serif;font-weight:800;font-size:clamp(18px,1.6vw,28px);letter-spacing:-.005em;margin-bottom:clamp(4px,.4vh,8px)}
.course .desc{font-size:clamp(10px,.65vw,12px);color:rgba(255,255,255,.35);line-height:1.5;max-width:380px}
.course .meta{display:flex;gap:clamp(8px,.8vw,14px);margin-top:clamp(12px,1.4vh,22px);flex-wrap:wrap}
.course .meta .m{padding:2px 8px;border:1px solid rgba(255,255,255,.06);font-size:clamp(8px,.48vw,10px);color:rgba(255,255,255,.2)}
.course .meta .m.active{border-color:rgba(82,168,255,.2);color:rgba(82,168,255,.6)}
.course .arrow{position:absolute;right:clamp(14px,1.4vw,24px);top:50%;transform:translateY(-50%);opacity:0;transition:all .3s;font-size:clamp(20px,2vw,32px);color:rgba(255,255,255,.15)}
.course:hover .arrow{opacity:1;transform:translateY(-50%) translateX(4px);color:rgba(82,168,255,.5)}
.course.empty{border-style:dashed;border-color:rgba(255,255,255,.04);cursor:default;display:flex;align-items:center;justify-content:center;min-height:clamp(120px,14vh,200px)}
.course.empty:hover{transform:none;background:rgba(255,255,255,.02)}
.course.empty .plus{font-size:clamp(28px,3vw,48px);color:rgba(255,255,255,.06);line-height:1}
.course.empty:hover .plus{color:rgba(255,255,255,.12)}
.course.empty p{font-size:clamp(10px,.6vw,12px);color:rgba(255,255,255,.08);margin-top:4px;letter-spacing:.02em}
@media(max-width:768px){.gd{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="bg">
  <img src="https://images.unsplash.com/photo-1462331940025-496dfbfc7564?w=1920&q=80" alt="" />
  <div class="g"></div>
</div>
<div class="ol"></div>
<div class="c">
  <header>
    <div class="eyebrow"><span class="b"></span>课程管理平台</div>
    <h1>所有课程</h1>
    <div class="sub">选择一门课，进入孩子版课件、家长课堂或教学设计。</div>
  </header>

  <div class="gd">

    <a class="course" href="ai-day-camp/">
      <div class="cs"></div>
      <span class="icon">🤖</span>
      <h2>超级AI一日营</h2>
      <div class="desc">9-11岁 · 3.5小时 · 让孩子用AI解决真问题。含Kolb学习循环、Prompt工程、AI动手实验室。</div>
      <div class="meta">
        <span class="m active">孩子版</span>
        <span class="m active">家长版</span>
        <span class="m active">教学设计</span>
      </div>
      <div class="arrow">→</div>
    </a>

    <div class="course empty">
      <div style="text-align:center">
        <div class="plus">+</div>
        <p>新课程待添加</p>
      </div>
    </div>

    <div class="course empty">
      <div style="text-align:center">
        <div class="plus">+</div>
        <p>新课程待添加</p>
      </div>
    </div>

    <div class="course empty">
      <div style="text-align:center">
        <div class="plus">+</div>
        <p>新课程待添加</p>
      </div>
    </div>

  </div>
</div>
</body>
</html>
